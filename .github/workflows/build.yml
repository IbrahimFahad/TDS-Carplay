name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.3.app

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project "TDS Video.xcodeproj" \
          -scheme "TDS Video" \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath "$PWD/build/TDSVideo.xcarchive" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" 2>&1 | tail -50

    - name: Create IPA
      run: |
        mkdir -p "$PWD/build/Payload"
        cp -r "$PWD/build/TDSVideo.xcarchive/Products/Applications/TDS Video.app" "$PWD/build/Payload/"
        cd "$PWD/build"
        zip -r TDSVideo.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: TDSVideo-IPA
        path: build/TDSVideo.ipa
        retention-days: 7
