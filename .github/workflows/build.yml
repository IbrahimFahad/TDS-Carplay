name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Show available SDKs
      run: xcodebuild -showsdks

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project "TDS Video.xcodeproj" \
          -scheme "TDS Video" \
          -configuration Release \
          -sdk iphoneos \
          -archivePath "$PWD/build/TDSVideo.xcarchive" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          SKIP_INSTALL=NO \
          2>&1 | tee build.log; exit ${PIPESTATUS[0]}

    - name: Show build errors if failed
      if: failure()
      run: grep -E "error:|BUILD FAILED" build.log | tail -50

    - name: Create IPA
      run: |
        APP_PATH=$(find "$PWD/build/TDSVideo.xcarchive" -name "*.app" | head -1)
        echo "Found app at: $APP_PATH"
        mkdir -p "$PWD/build/Payload"
        cp -r "$APP_PATH" "$PWD/build/Payload/"
        cd "$PWD/build"
        zip -r TDSVideo.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: TDSVideo-IPA
        path: build/TDSVideo.ipa
        retention-days: 7
